<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkk — Coming Soon</title>
<meta name="description" content="Arkk — recurring brand income infrastructure for creators. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,340;1,9..144,420&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F4F0EA;
    --ink:#16130F;
    --ink-soft:#4A443C;
    --brass:#B8873F;
    --brass-deep:#96702F;
    --line:rgba(22,19,15,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important;}
  }

  .card{
    max-width:560px;
    text-align:center;
  }

  .logo-mark{ width:30px; height:30px; margin:0 auto 16px; }

  .logo-word{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:var(--ink);
    padding-left:0.42em;
    margin-bottom:40px;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:9px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--brass-deep);
    border:1px solid var(--line);
    padding:7px 16px;
    border-radius:999px;
    margin-bottom:30px;
  }
  .eyebrow .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--brass);
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  h1{
    font-family:'Fraunces', serif;
    font-weight:340;
    font-size:clamp(34px, 6vw, 54px);
    line-height:1.1;
    letter-spacing:-0.01em;
    margin-bottom:18px;
  }
  h1 em{
    font-style:italic;
    font-weight:420;
    color:var(--brass-deep);
  }

  p.lede{
    font-size:16px;
    line-height:1.65;
    color:var(--ink-soft);
    max-width:420px;
    margin:0 auto 36px;
  }

  .contact{
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    letter-spacing:0.04em;
    color:var(--ink-soft);
  }
  .contact a{
    color:var(--brass-deep);
    text-decoration:none;
  }
  .contact a:hover{ text-decoration:underline; }
</style>
</head>
<body>

  <div class="card">
    <svg class="logo-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M20 4 L34 20 L20 36 L6 20 Z" stroke="#B8873F" stroke-width="1.4"/>
      <path d="M20 4 L20 36" stroke="#B8873F" stroke-width="1"/>
      <path d="M6 20 L34 20" stroke="#B8873F" stroke-width="1"/>
      <path d="M13 12 L27 28" stroke="#B8873F" stroke-width="0.6" opacity="0.6"/>
      <path d="M27 12 L13 28" stroke="#B8873F" stroke-width="0.6" opacity="0.6"/>
    </svg>
    <div class="logo-word">A R K K</div>

    <div class="eyebrow">
      <span class="dot" aria-hidden="true"></span>
      <span>Coming Soon</span>
    </div>

    <h1>Recurring brand<br><em>income is on the way.</em></h1>

    <p class="lede">We're building the infrastructure. Check back soon.</p>

    <div class="contact">
      <a href="mailto:partnerships@alternewmedia.com">partnerships@alternewmedia.com</a>
    </div>
  </div>

</body>
</html>
